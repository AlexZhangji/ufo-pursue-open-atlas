<?xml version="1.0" encoding="UTF-8"?>
<!-- PURSUE Open Atlas — README banner.
     Wax-stamp emblem at left + PURSUE / OPEN · ATLAS wordmark.
     520 × 140 — drop-in replacement for the v0.1 docs/logo.svg slot. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" role="img"
     aria-label="PURSUE Open Atlas — UAP Release 01">
  <!-- Emblem, centered in left ~140px column -->
  <g transform="translate(8, 8)">
    <circle cx="62" cy="62" r="59" fill="none" stroke="#1a1815" stroke-width="1.35"/>
    <circle cx="62" cy="62" r="53.5" fill="none" stroke="#1a1815" stroke-width="0.55"/>
    <polygon points="62,21 64.5,28 71.4,28 65.8,32.1 67.9,38.6 62,34.6 56.1,38.6 58.2,32.1 52.6,28 59.5,28"
             fill="#a83232"/>
    <circle cx="20.5" cy="62" r="1.4" fill="#1a1815"/>
    <circle cx="103.5" cy="62" r="1.4" fill="#1a1815"/>
    <text x="62" y="56" text-anchor="middle"
          font-family="'IBM Plex Mono', 'Courier New', monospace"
          font-size="11.5" font-weight="600" letter-spacing="1.7"
          fill="#1a1815">PURSUE</text>
    <text x="62" y="71" text-anchor="middle"
          font-family="'IBM Plex Mono', 'Courier New', monospace"
          font-size="7.7" letter-spacing="2.8"
          fill="#1a1815">OPEN · ATLAS</text>
    <line x1="40" y1="84" x2="84" y2="84" stroke="#a83232" stroke-width="0.6"/>
    <text x="62" y="97" text-anchor="middle"
          font-family="'IBM Plex Mono', 'Courier New', monospace"
          font-size="5.4" letter-spacing="1.6"
          fill="#a83232">MMXXVI · REL 01</text>
  </g>

  <!-- Wordmark on the right, baselines lined up to the emblem -->
  <g fill="#1a1815">
    <text x="155" y="64"
          font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
          font-size="44" font-weight="700"
          letter-spacing="-0.5">PURSUE</text>
    <text x="156" y="93"
          font-family="'IBM Plex Mono', 'Courier New', monospace"
          font-size="14" letter-spacing="4.5"
          fill="#44403a">OPEN · ATLAS</text>
    <line x1="156" y1="103" x2="354" y2="103" stroke="#a83232" stroke-width="0.7"/>
    <text x="156" y="120"
          font-family="'IBM Plex Mono', 'Courier New', monospace"
          font-size="9.5" letter-spacing="1.8"
          fill="#a83232">UAP DECLASSIFICATION · RELEASE 01</text>
  </g>
</svg>
